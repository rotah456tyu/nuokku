<script>
(function(){
  var HASH="bf37f01d31b29fd7d04ccd21923e086f8847bfa0cc45b9a1e8b5956028b0d38f";
  var KEY="nuokku_auth";
  function getStore(){try{if(window.localStorage)return localStorage;}catch(e){}try{if(window.sessionStorage)return sessionStorage;}catch(e){}return null;}
  var store=getStore();
  try{if(store&&store.getItem(KEY)===HASH)return;}catch(e){}
  var styleHide=document.createElement("style");
  styleHide.id="pw-hide-style";
  styleHide.textContent="body>*:not(#pw-overlay){display:none !important;}";
  (document.head||document.documentElement).appendChild(styleHide);
  function sha256(str){
    if(window.crypto&&window.crypto.subtle&&window.TextEncoder){
      return window.crypto.subtle.digest("SHA-256",new TextEncoder().encode(str)).then(function(buf){
        var a=Array.prototype.slice.call(new Uint8Array(buf));
        return a.map(function(b){return ("0"+b.toString(16)).slice(-2);}).join("");
      });
    }
    return Promise.reject("nocrypto");
  }
  function build(){
    var o=document.createElement("div");
    o.id="pw-overlay";
    o.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;background:linear-gradient(135deg,#e8f5e9 0%,#c8e6c9 100%);display:flex;align-items:center;justify-content:center;z-index:2147483647;font-family:Segoe UI,Arial,sans-serif;-webkit-tap-highlight-color:transparent;";
    o.innerHTML='<div style="background:#fff;padding:40px 32px;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.12);text-align:center;max-width:340px;width:88%;box-sizing:border-box;">'+
      '<h2 style="color:#2e7d32;margin:0 0 8px;font-size:1.7rem;">Nuokku.fi</h2>'+
      '<p style="color:#555;margin:0 0 22px;font-size:0.95rem;">Anna salasana p&auml;&auml;st&auml;ksesi sivulle</p>'+
      '<input id="pw-input" type="password" autocomplete="current-password" autocapitalize="off" autocorrect="off" inputmode="text" placeholder="Salasana" style="width:100%;padding:13px 16px;font-size:16px;border:2px solid #c8e6c9;border-radius:8px;outline:none;box-sizing:border-box;margin-bottom:12px;" />'+
      '<div id="pw-error" style="color:#e53935;font-size:0.85rem;min-height:20px;margin-bottom:8px;"></div>'+
      '<button id="pw-btn" type="button" style="width:100%;padding:13px;background:#2e7d32;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;-webkit-appearance:none;">Kirjaudu</button>'+
      '</div>';
    return o;
  }
  function attach(){
    if(document.getElementById("pw-overlay"))return;
    var o=build();
    document.body.appendChild(o);
    var inp=document.getElementById("pw-input");
    var err=document.getElementById("pw-error");
    var btn=document.getElementById("pw-btn");
    function ok(){
      var s=document.getElementById("pw-hide-style");if(s)s.parentNode.removeChild(s);
      var ov=document.getElementById("pw-overlay");if(ov)ov.parentNode.removeChild(ov);
    }
    function tryLogin(){
      var v=inp.value||"";
      sha256(v).then(function(h){
        if(h===HASH){try{if(store)store.setItem(KEY,HASH);}catch(e){}ok();}
        else{err.textContent="V\u00e4\u00e4r\u00e4 salasana, yrit\u00e4 uudelleen.";inp.value="";inp.focus();}
      }).catch(function(){
        err.textContent="Selaimesi ei tue suojausta. P\u00e4ivit\u00e4 selain.";
      });
    }
    btn.addEventListener("click",tryLogin);
    inp.addEventListener("keydown",function(e){if(e.key==="Enter"||e.keyCode===13){e.preventDefault();tryLogin();}});
    setTimeout(function(){try{inp.focus();}catch(e){}},50);
  }
  if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",attach);}else{attach();}
})();

function fD(s){const d=parseD(s);return d.getDate()+"."+(d.getMonth()+1)+"."+d.getFullYear();}
function getWeekNum(d){const tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=tmp.getUTCDay()||7;tmp.setUTCDate(tmp.getUTCDate()+4-dn);const ys=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));return Math.ceil((((tmp-ys)/86400000)+1)/7);}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function setStatus(msg,ok){const el=document.getElementById("syncStatus");el.textContent=msg;el.className="sync-status "+(ok?"sync-ok":"sync-err");}
onValue(ref(db,"reservations"),snap=>{reservations=[];snap.forEach(c=>reservations.push({id:c.key,...c.val()}));renderCalendar();renderResList();setStatus("Tietokanta yhdistetty",true);},err=>setStatus("Yhteysvirhe: "+err.message,false));
onValue(ref(db,"todos"),snap=>{todos=[];snap.forEach(c=>todos.push({id:c.key,...c.val()}));renderTodos();});
onValue(ref(db,"instructions"),snap=>{instructions=snap.val()||"";document.getElementById("instrText").value=instructions;});
onValue(ref(db,"chat"),snap=>{chatMessages=[];snap.forEach(c=>chatMessages.push({id:c.key,...c.val()}));renderChat();});
function getRes(ds){return reservations.find(r=>ds>=r.start&&ds<=r.end);}
function inRange(ds){if(!selStart)return false;const end=selEnd||hoverDate;if(!end)return ds===selStart;const a=selStart<end?selStart:end;const b=selStart<end?end:selStart;return ds>=a&&ds<=b;}
function renderCalendar(){updateOwnerLabels();document.getElementById("monthTitle").textContent=MONTHS[curMonth]+" "+curYear;const cal=document.getElementById("calendar");const today=dStr(new Date());const firstDay=new Date(curYear,curMonth,1);const lastDay=new Date(curYear,curMonth+1,0);const startDow=(firstDay.getDay()+6)%7;let html='<div class="cal-grid">';html+='<div class="cal-corner"></div>';DAYS.forEach(d=>html+='<div class="cal-header-cell">'+d+'</div>');let day=new Date(firstDay);day.setDate(day.getDate()-startDow);while(day<=lastDay||((day.getDay()+6)%7!==0)){if((day.getDay()+6)%7===0){const wn=getWeekNum(day);const wo=getWeekOwner(wn,day.getFullYear());const wCls=isOdd(wn)?"odd-week":"even-week";html+='<div class="cal-week-num '+wCls+'" title="Vk '+wn+': '+wo+'">'+wn+'</div>';}const ds=dStr(day);const inMonth=day.getMonth()===curMonth;const isPast=ds<today;const isToday=ds===today;const res=getRes(ds);const reserved=!!res;let cls="cal-cell";if(!inMonth)cls+=" empty";else if(isPast&&!isToday)cls+=" past";if(isToday)cls+=" today";if(inMonth&&reserved){cls+=" reserved";const wn=getWeekNum(day);cls+=isOdd(wn)?" reserved-odd":" reserved-even";}if(inMonth&&!reserved){const range=inRange(ds);if(range){const end=selEnd||hoverDate;const a=selStart<(end||selStart)?selStart:(end||selStart);const b=selStart<(end||selStart)?(end||selStart):selStart;if(ds===selStart&&!selEnd&&!hoverDate)cls+=" selecting-start";else if(ds===a||ds===b)cls+=" range-start";else cls+=" range-mid";}}let inner="";if(inMonth){inner='<div class="day-num">'+day.getDate()+'</div>';if(reserved&&res.name){const wn=getWeekNum(day);const rlcls=isOdd(wn)?"rl-odd":"rl-even";inner+='<span class="reservation-label '+rlcls+'" title="'+esc(res.name)+'">'+esc(res.name)+'</span>';}}const clickable=inMonth&&!reserved;html+='<div class="'+cls+'"'+(clickable?' onclick="calClick(\''+ds+'\')" onmouseover="calHover(\''+ds+'\')" onmouseout="calOut()"':'')+">"+ inner+"</div>";day.setDate(day.getDate()+1);}html+="</div>";cal.innerHTML=html;}
window.calClick=function(ds){if(!selStart||(selStart&&selEnd)){selStart=ds;selEnd=null;selActive=true;document.getElementById("dispStart").textContent=fD(ds);document.getElementById("dispStart").className="date-display";document.getElementById("dispEnd").textContent="Klikkaa lahtopaiva";document.getElementById("dispEnd").className="date-display empty-date";document.getElementById("hintBar").textContent="Klikkaa lahtopaiva";document.getElementById("hintBar").className="hint-bar";}else{if(ds<selStart){selEnd=selStart;selStart=ds;}else selEnd=ds;document.getElementById("dispStart").textContent=fD(selStart);document.getElementById("dispEnd").textContent=fD(selEnd);document.getElementById("dispEnd").className="date-display";document.getElementById("hintBar").textContent="Tayta varaajan nimi ja paina Lisaa varaus";document.getElementById("hintBar").className="hint-bar idle";selActive=false;}renderCalendar();};
window.calHover=function(ds){if(selActive){hoverDate=ds;renderCalendar();}};
window.calOut=function(){if(selActive){hoverDate=null;renderCalendar();}};
window.clearSelection=function(){selStart=null;selEnd=null;selActive=false;hoverDate=null;document.getElementById("dispStart").textContent="Klikkaa kalenterista";document.getElementById("dispStart").className="date-display empty-date";document.getElementById("dispEnd").textContent="Klikkaa kalenterista";document.getElementById("dispEnd").className="date-display empty-date";document.getElementById("hintBar").textContent="Klikkaa kalenterista aloituspaiva";document.getElementById("hintBar").className="hint-bar idle";renderCalendar();};
window.addReservation=function(){const name=document.getElementById("resName").value.trim();const msg=document.getElementById("msg");if(!name){msg.textContent="Syota varaajan nimi.";msg.className="msg";return;}if(!selStart||!selEnd){msg.textContent="Valitse saapumis- ja lahtopaiva kalenterista.";msg.className="msg";return;}const conflict=reservations.some(r=>selStart<=r.end&&selEnd>=r.start);if(conflict){msg.textContent="Valittu jakso on jo varattu!";msg.className="msg";return;}push(ref(db,"reservations"),{name,start:selStart,end:selEnd,ts:Date.now()}).then(()=>{msg.textContent="Varaus lisatty!";msg.className="msg ok";clearSelection();document.getElementById("resName").value="";}).catch(e=>{msg.textContent="Virhe: "+e.message;msg.className="msg";});};
function renderResList(){const el=document.getElementById("resList");if(!reservations.length){el.innerHTML='<div class="no-res">Ei varauksia.</div>';return;}const sorted=[...reservations].sort((a,b)=>a.start.localeCompare(b.start));el.innerHTML=sorted.map(r=>{const wn=getWeekNum(parseD(r.start));const wo=getWeekOwner(wn,parseD(r.start).getFullYear());const cls=isOdd(wn)?"odd-res":"even-res";return'<div class="res-item '+cls+'"><div><div class="res-name">'+esc(r.name)+'</div><div class="res-dates">'+fD(r.start)+' - '+fD(r.end)+'</div><div class="res-week">Vk '+wn+' ('+wo+')</div></div><button class="btn-del" onclick="delRes(\''+r.id+'\')">Poista</button></div>';}).join("");}
window.delRes=function(id){if(confirm("Poistetaanko varaus?"))remove(ref(db,"reservations/"+id));};
window.prevMonth=function(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();};
window.nextMonth=function(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();};
window.saveInstructions=function(){const txt=document.getElementById("instrText").value;set(ref(db,"instructions"),txt).then(()=>{const s=document.getElementById("instrSaved");s.classList.add("show");setTimeout(()=>s.classList.remove("show"),2000);});};
function renderTodos(){const ul=document.getElementById("todoList");if(!todos.length){ul.innerHTML='<li class="todo-empty">Ei tehtavia.</li>';return;}ul.innerHTML=todos.map(t=>'<li class="todo-item'+(t.done?" done":"")+'"><input type="checkbox" class="todo-cb"'+(t.done?" checked":"")+' onchange="toggleTodo(\''+t.id+'\',this.checked)"><span class="todo-text">'+esc(t.text)+'</span><button class="btn-todo-del" onclick="delTodo(\''+t.id+'\')">&#128465;</button></li>').join("");}
window.addTodo=function(){const inp=document.getElementById("todoInput");const txt=inp.value.trim();if(!txt)return;push(ref(db,"todos"),{text:txt,done:false,ts:Date.now()});inp.value="";};
window.toggleTodo=function(id,done){set(ref(db,"todos/"+id+"/done"),done);};
window.delTodo=function(id){remove(ref(db,"todos/"+id));};
function renderChat(){const el=document.getElementById("chatMessages");if(!chatMessages.length){el.innerHTML='<div class="chat-empty">Ei viesteja viela.</div>';return;}const sorted=[...chatMessages].sort((a,b)=>(a.ts||0)-(b.ts||0));el.innerHTML=sorted.map(m=>{const dt=m.ts?new Date(m.ts):null;const ts=dt?dt.getDate()+"."+(dt.getMonth()+1)+". "+String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0"):"";return'<div class="chat-msg"><div class="chat-msg-header"><span class="chat-msg-name">'+esc(m.name||"Tuntematon")+'</span><span><span class="chat-msg-time">'+ts+'</span><button class="btn-chat-del" onclick="delChatMsg(\''+m.id+'\')" title="Poista">&#10005;</button></span></div><div class="chat-msg-text">'+esc(m.text||"")+'</div></div>';}).join("");el.scrollTop=el.scrollHeight;}
window.sendChatMsg=function(){const name=document.getElementById("chatName").value.trim();const text=document.getElementById("chatText").value.trim();if(!name){alert("Kirjoita nimesi.");return;}if(!text){alert("Kirjoita viesti.");return;}push(ref(db,"chat"),{name,text,ts:Date.now()}).then(()=>{document.getElementById("chatText").value="";});};
window.delChatMsg=function(id){if(confirm("Poistetaanko viesti?"))remove(ref(db,"chat/"+id));};
renderCalendar();
</script>
</body>
</html>
